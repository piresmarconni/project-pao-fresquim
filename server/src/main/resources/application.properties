spring.config.import=optional:file:.env[.properties]
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# Banco de dados - Supabase (PostgreSQL)
# =============================================
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${DB_USER:postgres.mrueogwqnbkwarumjlfs}
spring.datasource.password=${DB_PASSWORD:j-bvgs-4iSt6L2Y}

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# =============================================
# Servidor
# =============================================
spring.application.name=spring-boot-essentials
server.port=${SERVER_PORT:8080}

# =============================================
# Connection pool
# =============================================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
